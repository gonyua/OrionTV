name: Build Android APK

on:
  push:
    branches:
      - master
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  direct_build:
    name: Build Android APKs (Mobile + TV)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Prebuild Mobile App
        run: yarn prebuild

      - name: Build Mobile APK
        run: yarn build

      - name: Archive Mobile APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/orionTV.${{ steps.package-version.outputs.version }}-mobile.apk

      - name: Prebuild TV App
        run: yarn prebuild-tv

      - name: Build TV APK
        run: yarn build-tv

      - name: Archive TV APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/orionTV.${{ steps.package-version.outputs.version }}.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Release v${{ steps.package-version.outputs.version }}
          body: Automated release for version v${{ steps.package-version.outputs.version }}.
          draft: false
          prerelease: false
          files: |
            artifacts/orionTV.${{ steps.package-version.outputs.version }}.apk
            artifacts/orionTV.${{ steps.package-version.outputs.version }}-tv.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify WeCom
        if: ${{ always() }}
        continue-on-error: true
        env:
          WECOM_WEBHOOK_URL: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b79fca4a-deca-484a-b1f1-0d4641f7dc13
          VERSION: ${{ steps.package-version.outputs.version }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eo pipefail

          version="${VERSION:-unknown}"
          platform='Android'
          apk_path="artifacts/orionTV.${version}.apk"
          apk_tv_path="artifacts/orionTV.${version}-tv.apk"
          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/v${version}"
          build_time="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"

          if [ "${JOB_STATUS}" = 'success' ]; then
            title='OrionTV 构建完成'
          else
            title="OrionTV 构建结束（${JOB_STATUS}）"
          fi

          payload="$(
            TITLE="$title" PLATFORM="$platform" APK_PATH="$apk_path" APK_TV_PATH="$apk_tv_path" RELEASE_URL="$release_url" RUN_URL="$RUN_URL" BUILD_TIME="$build_time" \
            python - <<'PY'
import json
import os

content = '\n'.join([
  os.environ['TITLE'],
  f"平台: {os.environ['PLATFORM']}",
  "IPA: N/A",
  f"Diawi: {os.environ['RELEASE_URL']}",
  f"APK: {os.environ['APK_PATH']}",
  f"TV APK: {os.environ['APK_TV_PATH']}",
  f"流水线: {os.environ['RUN_URL']}",
  f"时间: {os.environ['BUILD_TIME']}",
])

print(json.dumps({'msgtype': 'text', 'text': {'content': content}}, ensure_ascii=False))
PY
          )"

          curl -sS "$WECOM_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$payload"
